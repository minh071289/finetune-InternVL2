experiment:
  name: "wad_internvl3_training"
  version: "1.0"
  description: "InternVL2-2B for Autonomous Driving"
  tags: ["internvl2", "navigation", "mllm"]

model:
  architecture: "internvl"
  name: "OpenGVLab/InternVL2_5-2B"
  trust_remote_code: true
  multimodal_max_length: 8192

  lora:
    enabled: true
    r: 16
    alpha: 32
    dropout: 0.05
    target_modules:
      - "wqkv"
      - "wo"
      - "w1"
      - "w2"
      - "w3"
    bias: "none"
    task_type: "CAUSAL_LM"

  quantization:
    enabled: true
    bits: 4
    type: "nf4"
    double_quant: true
    compute_dtype: "bfloat16"

  vision:
    freeze_encoder: true
    min_pixels: 256
    max_pixels: 1280
    image_size: [448, 448]

data:
  name: "minhdang0901/WAD_Images_All_Size"
  num_frames: 1
  train_split: 0.9
  seed: 42

training:
  output_dir: "./outputs/internvl3_2b"
  num_epochs: 3
  batch_size: 1
  gradient_accumulation_steps: 4
  learning_rate: 2e-4
  warmup_steps: 100
  warmup_ratio: 0.03
  weight_decay: 0.01
  bf16: true
  fp16: false
  gradient_checkpointing: true
  optimizer: "adamw_bnb_8bit"
  lr_scheduler: "cosine"
  max_grad_norm: 1.0
  logging_steps: 10
  eval_strategy: "steps"
  eval_steps: 5
  save_steps: 1000
  save_total_limit: 2

evaluation:
  metrics: ["exact_match", "field_accuracy"]
  batch_size: 1

hardware:
  device: "cuda"
  num_workers: 0
  pin_memory: false
  cuda_alloc_conf: "expandable_segments:True"

tracking:
  enabled: true
  backend: "mlflow"
  project_name: "wad-vlm"
  log_model: true